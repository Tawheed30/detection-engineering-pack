title: Windows Password Spraying - Many Users Failed Logons (4625)
id: 2d0e7b3b-2a2d-4a2d-9c8a-4d3b5c2f1a10
status: experimental
description: Detects password spraying by identifying a single source IP causing failed logons (4625) across many distinct usernames in a short window.
references:
  - https://attack.mitre.org/techniques/T1110/
author: Mohammed Tawheed
date: 2026/03/04
tags:
  - attack.t1110
  - attack.credential_access
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  group_by:
    - IpAddress
  timeframe: 10m
  condition: selection | value_count(TargetUserName) >= 6
falsepositives:
  - Shared jump hosts / NAT egress IPs where many users authenticate
  - Corporate VPN concentrators
  - Vulnerability scanners / password audit tools from known ranges
level: medium
